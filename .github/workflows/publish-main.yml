name: Render and Publish

on:
  push:
    branches: main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'renv'

      - name: Install System Dependencies for R Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudunits2-dev \
            libgdal-dev \
            libproj-dev \
            libgeos-dev \
            libfontconfig1-dev \
            libcairo2-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libcurl4-openssl-dev \
            libjpeg-dev \
            libpng-dev \
            unixodbc-dev

      - name: Install R Dependencies
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Render book
        id: render
        continue-on-error: true
        run: quarto render

      - name: Upload PR preview as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-book-${{ github.event.pull_request.number }}
          path: ./_site/

      - name: Deploy to GitHub Pages
        if: steps.render.outcome == 'success'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site
          destination_dir: .
          keep_files: true

      - name: Fail job if render failed
        if: steps.render.outcome != 'success'
        run: |
          echo "'quarto render' failed. Please chcek the log."
          exit 1
