name: Render and Publish

on:
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'renv'

      - name: Install System Dependencies for R Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudunits2-dev \
            libgdal-dev \
            libproj-dev \
            libgeos-dev \
            libfontconfig1-dev \
            libcairo2-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libcurl4-openssl-dev \
            libjpeg-dev \
            libpng-dev \
            unixodbc-dev

      - name: Install R Dependencies
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Auto-install Required Packages and Update renv.lock
        run: |
          Rscript -e "renv::hydrate()"
          Rscript -e "renv::snapshot(prompt = FALSE)"

      - name: Render and Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request with updates
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update _freeze cache and renv.lock"
          title: "chore: auto-update dependencies and cache"
          body: "This is a PR for Updating `renv.lock` and `_freeze` created using GitHub Actions"
          branch: "auto-update-cache"
          delete-branch: true
